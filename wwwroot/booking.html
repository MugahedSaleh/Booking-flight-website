<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyBook – My Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #0a1628;
      --deep:   #071020;
      --gold:   #e8b84b;
      --amber:  #f0c96e;
      --cream:  #f7f0e4;
      --mist:   rgba(232,184,75,0.12);
      --glass:  rgba(255,255,255,0.04);
      --border: rgba(232,184,75,0.2);
      --red:    #e05252;
      --green:  #52c97a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sky);
      color: var(--cream);
      min-height: 100vh;
    }

    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 85% 25%, rgba(255,255,255,0.2) 0%, transparent 100%);
    }

    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(7,16,32,0.6);
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; font-weight: 900;
      color: var(--gold);
    }
    .logo span { color: var(--cream); }
    .nav-link {
      color: rgba(247,240,228,0.7); text-decoration: none;
      font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--gold); }

    /* PAGE */
    .page {
      position: relative; z-index: 1;
      max-width: 680px; margin: 4rem auto; padding: 0 2rem;
    }

    .page-badge {
      display: inline-block;
      background: var(--mist); border: 1px solid var(--border);
      color: var(--gold); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 0.3rem 0.9rem; border-radius: 99px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem; font-weight: 900;
      color: var(--cream); margin-bottom: 0.4rem;
    }

    .subtitle {
      color: rgba(247,240,228,0.45); font-size: 0.95rem; margin-bottom: 2.5rem;
    }

    /* TICKET CARD */
    .ticket {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .ticket-header {
      background: rgba(232,184,75,0.1);
      border-bottom: 1px solid var(--border);
      padding: 1.4rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ticket-airline { font-size: 0.8rem; color: var(--gold); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .ticket-number { font-size: 0.75rem; color: rgba(247,240,228,0.4); }
    .ticket-ref {
      background: var(--mist); border: 1px solid var(--border);
      color: var(--gold); font-weight: 700; letter-spacing: 2px;
      padding: 0.3rem 0.9rem; border-radius: 6px; font-size: 0.9rem;
    }

    .ticket-route {
      padding: 2rem;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 1rem;
      border-bottom: 1px dashed var(--border);
    }
    .route-city {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; font-weight: 900; color: var(--cream);
    }
    .route-time {
      font-size: 0.85rem; color: var(--gold); margin-top: 0.2rem; font-weight: 600;
    }
    .route-date { font-size: 0.75rem; color: rgba(247,240,228,0.4); }

    .route-arrow {
      text-align: center;
      color: var(--gold); font-size: 1.8rem;
    }
    .route-label {
      font-size: 0.7rem; color: rgba(247,240,228,0.3);
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 0.3rem;
    }

    .ticket-details {
      padding: 1.5rem 2rem;
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .detail-item { }
    .detail-label {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: rgba(247,240,228,0.35);
      margin-bottom: 0.3rem;
    }
    .detail-value { font-size: 0.9rem; color: var(--cream); font-weight: 500; }

    .ticket-footer {
      background: rgba(232,184,75,0.06);
      border-top: 1px dashed var(--border);
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .price-label { font-size: 0.72rem; color: rgba(247,240,228,0.35); text-transform: uppercase; letter-spacing: 1px; }
    .price-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; color: var(--gold); font-weight: 700;
    }

    /* BUTTONS */
    .action-row { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .btn {
      flex: 1; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      padding: 0.8rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: rgba(247,240,228,0.6);
    }
    .btn-ghost:hover { border-color: var(--red); color: var(--red); }
    .btn-gold {
      background: var(--gold); color: var(--deep);
      border: none;
      box-shadow: 0 4px 20px rgba(232,184,75,0.3);
    }
    .btn-gold:hover { background: var(--amber); }

    /* NO BOOKING STATE */
    .no-booking {
      text-align: center; padding: 3rem 2rem;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 20px;
      animation: fadeUp 0.5s ease both;
    }
    .no-booking .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .no-booking h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .no-booking p { color: rgba(247,240,228,0.45); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .btn-go {
      display: inline-block;
      background: var(--gold); color: var(--deep);
      text-decoration: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      padding: 0.75rem 2rem;
      transition: background 0.2s;
    }
    .btn-go:hover { background: var(--amber); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
      background: #1a2f50; border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.4rem; max-width: 320px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transform: translateY(100px); opacity: 0;
      transition: all 0.35s cubic-bezier(0.34,1.3,0.64,1);
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { border-color: var(--green); }
    .toast.error   { border-color: var(--red); }
    .toast-title { font-weight:700; margin-bottom:0.2rem; }
    .toast.success .toast-title { color:var(--green); }
    .toast.error   .toast-title { color:var(--red); }
    .toast-msg { font-size:0.82rem; color:rgba(247,240,228,0.65); }

    .loading { text-align:center; padding:3rem; color:rgba(247,240,228,0.4); }
  </style>
</head>
<body>
  <div class="stars"></div>

  <nav>
    <div class="logo">Sky<span>Book</span></div>
    <a href="index.html" class="nav-link">← Search Flights</a>
  </nav>

  <div class="page">
    <div class="page-badge">✈ My Boarding Pass</div>
    <h1>Your Booking</h1>
    <p class="subtitle">Your confirmed flight details are shown below</p>

    <div id="content">
      <div class="loading">Loading your booking…</div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-msg" id="toastMsg"></div>
  </div>

  <script>
    // GET /booking — reads cookie and returns booking data
    // This mirrors the GET /profile endpoint from Lab 5
    async function loadBooking() {
      try {
        const res  = await fetch("/booking", { credentials: "include" });
        const data = await res.json();

        if (res.ok && data.status === "Success") {
          renderTicket(data.booking);
        } else {
          renderNoBooking();
        }
      } catch(e) {
        renderNoBooking();
      }
    }

    function renderTicket(b) {
      document.getElementById("content").innerHTML = `
        <div class="ticket">
          <div class="ticket-header">
            <div>
              <div class="ticket-airline">${b.airline}</div>
              <div class="ticket-number">${b.flightNumber}</div>
            </div>
            <div class="ticket-ref">${b.reference}</div>
          </div>

          <div class="ticket-route">
            <div>
              <div class="route-city">${b.from}</div>
              <div class="route-time">${b.departureTime}</div>
              <div class="route-date">${b.date}</div>
            </div>
            <div class="route-arrow">
              ✈
              <div class="route-label">Direct</div>
            </div>
            <div style="text-align:right">
              <div class="route-city">${b.to}</div>
            </div>
          </div>

          <div class="ticket-details">
            <div class="detail-item">
              <div class="detail-label">Passenger</div>
              <div class="detail-value">${b.passengerName}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Email</div>
              <div class="detail-value">${b.email}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Seat Class</div>
              <div class="detail-value">${b.seatClass}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Booked At</div>
              <div class="detail-value">${b.bookedAt}</div>
            </div>
          </div>

          <div class="ticket-footer">
            <div>
              <div class="price-label">Total Fare</div>
              <div class="price-value">$${b.price}</div>
            </div>
            <div style="font-size:0.75rem;color:rgba(247,240,228,0.3)">Have a safe flight ✈</div>
          </div>
        </div>

        <div class="action-row">
          <button class="btn btn-ghost" onclick="cancelBooking()">Cancel Booking</button>
          <a href="index.html" class="btn btn-gold" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;">Book Another Flight</a>
        </div>`;
    }

    function renderNoBooking() {
      document.getElementById("content").innerHTML = `
        <div class="no-booking">
          <div class="icon">🎫</div>
          <h2>No Active Booking</h2>
          <p>You haven't booked a flight yet, or your booking was cancelled.</p>
          <a href="index.html" class="btn-go">Search Flights</a>
        </div>`;
    }

    // GET /cancel — deletes the cookie (like GET /logout in Lab 5)
    async function cancelBooking() {
      if (!confirm("Are you sure you want to cancel your booking?")) return;

      try {
        const res  = await fetch("/cancel", { credentials: "include" });
        const data = await res.json();

        if (data.status === "Success") {
          showToast("success","Cancelled","Your booking has been cancelled.");
          setTimeout(() => renderNoBooking(), 1500);
        }
      } catch(e) {
        showToast("error","Error","Could not cancel booking.");
      }
    }

    function showToast(type, title, msg) {
      const t = document.getElementById("toast");
      document.getElementById("toastTitle").textContent = title;
      document.getElementById("toastMsg").textContent   = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove("show"), 4000);
    }

    loadBooking();
  </script>
</body>
</html>
