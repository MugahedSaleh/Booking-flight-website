<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyBook – Book Your Flight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────
       CSS VARIABLES & RESET
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #0a1628;
      --deep:   #071020;
      --gold:   #e8b84b;
      --amber:  #f0c96e;
      --cream:  #f7f0e4;
      --mist:   rgba(232,184,75,0.12);
      --glass:  rgba(255,255,255,0.04);
      --border: rgba(232,184,75,0.2);
      --red:    #e05252;
      --green:  #52c97a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sky);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────
       STAR BACKGROUND
    ───────────────────────────────────────── */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 70% 60%, rgba(255,255,255,0.15) 0%, transparent 100%);
    }

    /* ─────────────────────────────────────────
       NAV
    ───────────────────────────────────────── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(7,16,32,0.6);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; font-weight: 900;
      color: var(--gold);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--cream); }

    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul li a {
      color: rgba(247,240,228,0.7);
      text-decoration: none; font-size: 0.9rem; font-weight: 500;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    nav ul li a:hover { color: var(--gold); }

    /* ─────────────────────────────────────────
       HERO
    ───────────────────────────────────────── */
    .hero {
      position: relative; z-index: 1;
      text-align: center;
      padding: 5rem 2rem 3rem;
    }

    .hero-badge {
      display: inline-block;
      background: var(--mist);
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: 0.75rem; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.35rem 1rem; border-radius: 99px;
      margin-bottom: 1.5rem;
      animation: fadeDown 0.6s ease both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 900; line-height: 1.1;
      color: var(--cream);
      animation: fadeDown 0.7s ease 0.1s both;
    }
    h1 em { color: var(--gold); font-style: normal; }

    .hero-sub {
      margin-top: 1rem;
      color: rgba(247,240,228,0.5);
      font-size: 1.05rem; font-weight: 300;
      animation: fadeDown 0.7s ease 0.2s both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────────────────
       SEARCH CARD
    ───────────────────────────────────────── */
    .search-card {
      position: relative; z-index: 5;
      max-width: 860px; margin: 2.5rem auto 0;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.2rem 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease 0.3s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 1rem; align-items: end;
    }

    .field label {
      display: block;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.5rem;
    }

    .field input, .field select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; padding: 0.75rem 1rem;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--gold);
      background: rgba(232,184,75,0.08);
    }
    .field select option { background: #0d1f3c; }
    .field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7) sepia(1) saturate(3) hue-rotate(5deg);
      cursor: pointer;
    }

    .btn-search {
      background: var(--gold);
      color: var(--deep);
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      padding: 0.77rem 1.8rem; cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(232,184,75,0.3);
    }
    .btn-search:hover {
      background: var(--amber);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(232,184,75,0.45);
    }
    .btn-search:active { transform: translateY(0); }

    /* ─────────────────────────────────────────
       RESULTS SECTION
    ───────────────────────────────────────── */
    .results-section {
      position: relative; z-index: 2;
      max-width: 860px; margin: 2.5rem auto 4rem;
      animation: fadeUp 0.5s ease both;
    }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .results-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; color: var(--cream);
    }
    .results-count {
      font-size: 0.8rem; color: rgba(247,240,228,0.5);
    }

    .flight-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr auto auto;
      align-items: center; gap: 1.2rem;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .flight-card:hover {
      border-color: rgba(232,184,75,0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .flight-city { font-size: 1.6rem; font-weight: 700; color: var(--cream); }
    .flight-time { font-size: 0.8rem; color: rgba(247,240,228,0.5); margin-top: 0.1rem; }
    .flight-date { font-size: 0.75rem; color: var(--gold); }

    .flight-arrow {
      text-align: center; color: var(--gold); font-size: 1.2rem;
    }
    .flight-duration {
      font-size: 0.72rem; color: rgba(247,240,228,0.4);
      margin-top: 0.2rem; text-align: center;
    }

    .flight-info { text-align: center; }
    .flight-airline { font-size: 0.8rem; color: var(--gold); font-weight: 600; }
    .flight-number { font-size: 0.72rem; color: rgba(247,240,228,0.4); }
    .flight-seats { font-size: 0.72rem; color: var(--green); margin-top: 0.2rem; }

    .flight-price { text-align: right; }
    .price-amount {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; color: var(--gold); font-weight: 700;
    }
    .price-label { font-size: 0.72rem; color: rgba(247,240,228,0.4); }

    .btn-select {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      padding: 0.55rem 1.1rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-select:hover {
      background: var(--gold); color: var(--deep);
    }

    .empty-state {
      text-align: center; padding: 3rem;
      color: rgba(247,240,228,0.3);
      font-size: 1rem;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.8rem; }

    /* ─────────────────────────────────────────
       MODAL — BOOKING FORM
    ───────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(7,16,32,0.85);
      backdrop-filter: blur(10px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #0d1f3c;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%; max-width: 500px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; color: var(--cream);
    }
    .modal-close {
      background: none; border: none; color: rgba(247,240,228,0.4);
      font-size: 1.4rem; cursor: pointer; transition: color 0.2s;
    }
    .modal-close:hover { color: var(--cream); }

    .flight-summary {
      background: rgba(232,184,75,0.08);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .fs-route { font-weight: 700; font-size: 1.05rem; color: var(--cream); }
    .fs-details { font-size: 0.78rem; color: rgba(247,240,228,0.5); }
    .fs-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; color: var(--gold); font-weight: 700;
    }

    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.4rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; padding: 0.7rem 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--gold);
    }
    .form-group select option { background: #0d1f3c; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .btn-book {
      width: 100%;
      background: var(--gold); color: var(--deep);
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700;
      padding: 0.9rem; cursor: pointer; margin-top: 0.5rem;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,184,75,0.3);
    }
    .btn-book:hover {
      background: var(--amber);
      box-shadow: 0 8px 28px rgba(232,184,75,0.45);
    }

    /* ─────────────────────────────────────────
       CONFIRMATION MODAL
    ───────────────────────────────────────── */
    .confirm-modal {
      text-align: center;
    }
    .confirm-icon {
      font-size: 3.5rem; margin-bottom: 1rem;
    }
    .confirm-ref {
      display: inline-block;
      background: var(--mist);
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: 1.3rem; font-weight: 700;
      padding: 0.5rem 1.5rem; border-radius: 8px;
      margin: 0.8rem 0 1.4rem;
      letter-spacing: 2px;
    }
    .confirm-details { font-size: 0.85rem; color: rgba(247,240,228,0.6); line-height: 1.8; }

    .btn-row { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .btn-outline {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: rgba(247,240,228,0.7);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      padding: 0.75rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-primary {
      flex: 1;
      background: var(--gold); color: var(--deep);
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      padding: 0.75rem; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--amber); }

    /* ─────────────────────────────────────────
       TOAST
    ───────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
      background: #1a2f50; border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.4rem;
      max-width: 340px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transform: translateY(100px); opacity: 0;
      transition: all 0.35s cubic-bezier(0.34,1.3,0.64,1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); }
    .toast.error   { border-color: var(--red); }
    .toast-title { font-weight: 700; margin-bottom: 0.2rem; }
    .toast.success .toast-title { color: var(--green); }
    .toast.error   .toast-title { color: var(--red); }
    .toast-msg { font-size: 0.85rem; color: rgba(247,240,228,0.7); }

    /* ─────────────────────────────────────────
       LOADING SPINNER
    ───────────────────────────────────────── */
    .spinner-wrap {
      display: none; text-align: center; padding: 2rem;
    }
    .spinner-wrap.show { display: block; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.8rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESPONSIVE */
    @media (max-width: 720px) {
      nav { padding: 1rem 1.2rem; }
      nav ul { display: none; }
      .search-grid { grid-template-columns: 1fr 1fr; }
      .search-grid .btn-search { grid-column: 1 / -1; }
      .flight-card { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <!-- NAV -->
  <nav>
    <div class="logo">Sky<span>Book</span></div>
    <ul>
      <li><a href="#search">Search</a></li>
      <li><a href="booking.html">My Booking</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero" id="search">
    <div class="hero-badge">✈ Smart Flight Booking</div>
    <h1>Fly Anywhere<br>with <em>Confidence</em></h1>
    <p class="hero-sub">Search, compare, and book flights instantly</p>

    <!-- SEARCH CARD -->
    <div class="search-card">
      <div class="search-grid">
        <div class="field">
          <label>From</label>
          <select id="fromCity">
            <option value="">Any City</option>
          </select>
        </div>
        <div class="field">
          <label>To</label>
          <select id="toCity">
            <option value="">Any City</option>
          </select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="travelDate" />
        </div>
        <button class="btn-search" onclick="searchFlights()">Search ✈</button>
      </div>
    </div>
  </section>

  <!-- RESULTS -->
  <section class="results-section" id="resultsSection" style="display:none;">
    <div class="results-header">
      <h2>Available Flights</h2>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <div style="color:rgba(247,240,228,0.4);font-size:0.85rem;">Searching flights…</div>
    </div>
    <div id="flightList"></div>
  </section>

  <!-- BOOKING MODAL -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Complete Booking</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="flight-summary" id="flightSummary"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="passengerName" placeholder="e.g. Ahmed Al-Rashid" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Passport Number</label>
          <input type="text" id="passport" placeholder="A12345678" />
        </div>
        <div class="form-group">
          <label>Seat Class</label>
          <select id="seatClass">
            <option value="Economy">Economy</option>
            <option value="Business">Business</option>
            <option value="First Class">First Class</option>
          </select>
        </div>
      </div>
      <button class="btn-book" onclick="submitBooking()">Confirm Booking</button>
    </div>
  </div>

  <!-- CONFIRMATION MODAL -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal confirm-modal">
      <div class="confirm-icon">🎉</div>
      <div class="modal-title" style="margin-bottom:0.3rem;">Booking Confirmed!</div>
      <div class="confirm-ref" id="confirmRef">BK000000</div>
      <div class="confirm-details" id="confirmDetails"></div>
      <div class="btn-row">
        <button class="btn-outline" onclick="closeConfirm()">Book Another</button>
        <button class="btn-primary" onclick="goToBooking()">View Booking</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-msg" id="toastMsg"></div>
  </div>

  <script>
    // ─────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────
    const API = "";   // empty = same origin (our ASP.NET server)
    let selectedFlight = null;

    // ─────────────────────────────────────────
    // ON PAGE LOAD — populate dropdowns from GET /flights/all
    // ─────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const res  = await fetch(`${API}/flights/all`);
        const data = await res.json();

        const cities = [...new Set([...data.map(f => f.from), ...data.map(f => f.to)])].sort();

        ["fromCity","toCity"].forEach(id => {
          const sel = document.getElementById(id);
          cities.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c; opt.textContent = c;
            sel.appendChild(opt);
          });
        });
      } catch(e) {
        showToast("error","Server Offline","Make sure the ASP.NET backend is running on port 5050.");
      }
    });

    // ─────────────────────────────────────────
    // SEARCH FLIGHTS — GET /flights?from=&to=&date=
    // ─────────────────────────────────────────
    async function searchFlights() {
      const from = document.getElementById("fromCity").value;
      const to   = document.getElementById("toCity").value;
      const date = document.getElementById("travelDate").value;

      const section = document.getElementById("resultsSection");
      const list    = document.getElementById("flightList");
      const spinner = document.getElementById("spinner");

      section.style.display = "block";
      list.innerHTML = "";
      spinner.classList.add("show");

      // Build query string for GET request
      const params = new URLSearchParams();
      if (from) params.append("from", from);
      if (to)   params.append("to", to);
      if (date) params.append("date", date);

      try {
        const res     = await fetch(`${API}/flights?${params.toString()}`);
        const flights = await res.json();

        spinner.classList.remove("show");
        document.getElementById("resultsCount").textContent = `${flights.length} flight(s) found`;

        if (flights.length === 0) {
          list.innerHTML = `<div class="empty-state"><div class="icon">🔭</div>No flights found. Try different dates or cities.</div>`;
          return;
        }

        flights.forEach(f => {
          list.innerHTML += buildFlightCard(f);
        });
      } catch(e) {
        spinner.classList.remove("show");
        showToast("error","Connection Error","Could not reach the backend server.");
      }
    }

    function buildFlightCard(f) {
      const seats = f.seatsAvailable < 10
        ? `<span style="color:#e05252">Only ${f.seatsAvailable} seats left!</span>`
        : `${f.seatsAvailable} seats available`;

      return `
        <div class="flight-card" onclick="openBookingModal(${JSON.stringify(f).replace(/"/g,'&quot;')})">
          <div>
            <div class="flight-city">${f.from}</div>
            <div class="flight-time">${f.departureTime}</div>
            <div class="flight-date">${f.date}</div>
          </div>
          <div class="flight-arrow">
            ✈
            <div class="flight-duration">Direct</div>
          </div>
          <div>
            <div class="flight-city">${f.to}</div>
            <div class="flight-time">${f.arrivalTime}</div>
          </div>
          <div class="flight-info">
            <div class="flight-airline">${f.airline}</div>
            <div class="flight-number">${f.flightNumber}</div>
            <div class="flight-seats">${seats}</div>
          </div>
          <div class="flight-price">
            <div class="price-amount">$${f.price}</div>
            <div class="price-label">per person</div>
          </div>
          <button class="btn-select">Select</button>
        </div>`;
    }

    // ─────────────────────────────────────────
    // OPEN BOOKING MODAL
    // ─────────────────────────────────────────
    function openBookingModal(flight) {
      selectedFlight = flight;

      document.getElementById("flightSummary").innerHTML = `
        <div>
          <div class="fs-route">${flight.from} → ${flight.to}</div>
          <div class="fs-details">${flight.airline} · ${flight.flightNumber} · ${flight.date} · ${flight.departureTime}</div>
        </div>
        <div class="fs-price">$${flight.price}</div>`;

      document.getElementById("bookingModal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("bookingModal").classList.remove("open");
    }

    // ─────────────────────────────────────────
    // SUBMIT BOOKING — POST /book  (JSON body)
    // ─────────────────────────────────────────
    async function submitBooking() {
      const name     = document.getElementById("passengerName").value.trim();
      const email    = document.getElementById("email").value.trim();
      const passport = document.getElementById("passport").value.trim();
      const seatCls  = document.getElementById("seatClass").value;

      if (!name || !email) {
        showToast("error","Missing Info","Please enter your name and email.");
        return;
      }

      const body = {
        flightId:       selectedFlight.id,
        passengerName:  name,
        email:          email,
        passportNumber: passport,
        seatClass:      seatCls
      };

      try {
        // POST with JSON body — like the login POST in Lab 5
        const res  = await fetch(`${API}/book`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify(body),
          credentials: "include"
        });

        const data = await res.json();

        if (res.ok && data.status === "Success") {
          closeModal();
          showConfirmation(data.booking);
        } else {
          showToast("error","Booking Failed", data.message || "Please check your details.");
        }
      } catch(e) {
        showToast("error","Network Error","Could not connect to the server.");
      }
    }

    // ─────────────────────────────────────────
    // CONFIRMATION
    // ─────────────────────────────────────────
    function showConfirmation(booking) {
      document.getElementById("confirmRef").textContent = booking.reference;
      document.getElementById("confirmDetails").innerHTML = `
        <strong>${booking.passengerName}</strong><br>
        ${booking.from} → ${booking.to}<br>
        ${booking.airline} · ${booking.flightNumber}<br>
        ${booking.date} at ${booking.departureTime}<br>
        ${booking.seatClass} · $${booking.price}<br>
        Booked at ${booking.bookedAt}`;
      document.getElementById("confirmModal").classList.add("open");
    }

    function closeConfirm() {
      document.getElementById("confirmModal").classList.remove("open");
    }

    function goToBooking() {
      window.location.href = "booking.html";
    }

    // ─────────────────────────────────────────
    // TOAST HELPER
    // ─────────────────────────────────────────
    function showToast(type, title, msg) {
      const t = document.getElementById("toast");
      document.getElementById("toastTitle").textContent = title;
      document.getElementById("toastMsg").textContent   = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove("show"), 4000);
    }
  </script>
</body>
</html>
